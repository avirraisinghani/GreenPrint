  {icon:"🛡️",category:"Home & car insurance",   headline:"Carbon-linked premium discounts",  body:"A growing number of insurers have begun trialling carbon-aware pricing, where lower verified energy footprints can qualify for reduced premiums. Terms and availability vary by provider and region.",                                                                                   threshold:20,color:"#4ade80"},

function TrackTab({vals,onChange,onAnalyse}){
  return(
    <div className="page">
      <span className="eyebrow">Personal energy calculator</span>
      <div className="page-title">Know your<br/><em>footprint.</em></div>
      <p className="page-sub">Adjust each slider to match your daily habits. All figures use verified energy coefficients — see the Compare tab for methodology.</p>
      <div className="sl-list">
        {Object.entries(CFG).map(([id,c])=>{
          const kwh=c.kwh(vals[id]);
          const r=getRating(kwh*5);
          const pct=((vals[id]-c.min)/(c.max-c.min))*100;
          return(
            <div key={id} className="sl-item">
              <div className="sl-icon">{c.icon}</div>
              <div className="sl-mid">
                <div className="sl-meta">
                  <span className="sl-name">{c.label}</span>
                  <span className="sl-pill">{vals[id]} <span style={{fontSize:9,color:"#4a7044"}}>{c.unit}</span></span>
                </div>
                <input type="range" min={c.min} max={c.max} step={c.step} value={vals[id]}
                  style={{background:`linear-gradient(90deg,#4ade80 ${pct}%,#1a2e1a ${pct}%)`}}
                  onChange={e=>onChange(id,parseFloat(e.target.value))}/>
              </div>
              <div className="sl-right">
                <div className="sl-kwh" style={{color:r.color}}>{fmt(kwh)}</div>
                <div className="sl-ku">kWh/day</div>
              </div>
            </div>
          );
        })}
      </div>
      <button className="analyse-btn" onClick={onAnalyse}>See my results →</button>
    </div>
  );
}

function ResultsTab({vals,total,onBack}){
  const r=getRating(total);
  const yearly=Math.round(total*365);
  const below=total<GLOBAL_AVG;
  const co2SavedYr=below?(GLOBAL_AVG-total)*CO2_PER_KWH*365:0;
  const treeEquiv=(co2SavedYr/CO2_PER_TREE_YR).toFixed(1);
  const items=Object.entries(CFG).map(([id,c])=>({id,c,kwh:c.kwh(vals[id])})).sort((a,b)=>b.kwh-a.kwh);
  const maxK=Math.max(...items.map(i=>i.kwh),.1);
  const tColors=["#4ade80","#86efac","#fbbf24","#fb923c"];
  return(
    <div className="page">
      <button className="back-btn" onClick={onBack}>← Back to sliders</button>
      <div className="score-hero">
        <span className="eyebrow">Your daily energy footprint</span>
        <div className="score-row">
          <div className="score-big" style={{color:r.color}}>{fmt(total)}</div>
          <div className="score-aside">
            <span className="score-unit-lbl">kWh/day</span>
            <span className="score-badge" style={{background:r.color+"18",color:r.color}}>{r.label}</span>
          </div>
        </div>
        <div className="score-context">{((total/GLOBAL_AVG)*100).toFixed(0)}% of the 28 kWh/day world average (IEA 2022)</div>
      </div>
      <div className="stats-strip">
        <div className="stat-cell">
          <span className="eyebrow">Per year</span>
          <div className="stat-val">{yearly.toLocaleString()}</div>
          <div className="stat-sub">kWh / year</div>
        </div>
        <div className="stat-cell">
          <span className="eyebrow">{below?"CO₂ saved vs avg":"CO₂ above avg"}</span>
          <div className="stat-val" style={{color:below?"#4ade80":"#f87171"}}>
            {below?(co2SavedYr/1000).toFixed(1)+" t":"+"+((total-GLOBAL_AVG)*CO2_PER_KWH*365/1000).toFixed(1)+" t"}
          </div>
          <div className="stat-sub">vs world average / year</div>
        </div>
        <div className="stat-cell">
          <span className="eyebrow">{below?"Tree equivalent":"vs world avg"}</span>
          <div className="stat-val" style={{color:below?"#4ade80":"#f87171"}}>
            {below?treeEquiv:"+"+fmt(total-GLOBAL_AVG)}
          </div>
          <div className="stat-sub">{below?"trees absorbing your saving":"kWh/day over avg"}</div>
        </div>
      </div>
      <div className="bars-wrap">
        <span className="eyebrow" style={{marginBottom:16,display:"block"}}>Breakdown by category</span>
        {items.map((it,i)=>(
          <div key={it.id} className="bar-row">
            <span className="bar-ico">{it.c.icon}</span>
            <span className="bar-lbl">{it.c.label}</span>
            <div className="bar-track">
              <div className="bar-fill" style={{width:(it.kwh/maxK*100)+"%",background:BAR_COLORS[i]}}/>
            </div>
            <span className="bar-num" style={{color:BAR_COLORS[i]}}>{fmt(it.kwh)}</span>
          </div>
        ))}
      </div>
      <div>
        <span className="eyebrow" style={{marginBottom:8,display:"block"}}>Where to focus first</span>
        {items.slice(0,4).map((it,i)=>(
          <div key={it.id} className="tip-row">
            <div className="tip-num" style={{color:tColors[i]}}>#{i+1}</div>
            <div>
              <div className="tip-cat">{it.c.icon} {it.c.label}</div>
              <div className="tip-body">{TIPS[it.id].text}</div>
              <div className="tip-src">Source: {TIPS[it.id].src}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function EarnTab({total}){
  return(
    <div className="page">
      <span className="eyebrow">Financial incentives</span>
      <div className="page-title">Reducing has<br/><em>real value.</em></div>
      <p className="page-sub">These categories of incentive programmes exist — but terms, availability and amounts vary by provider, country and time. Always verify directly with the provider before making decisions.</p>
      <div className="earn-list">
        {INCENTIVES.map((inc,i)=>{
          const q=total<=inc.threshold;
          const near=!q&&total<=inc.threshold*1.3;
          const prog=Math.min(100,(inc.threshold/total)*100);
          return(
            <div key={i} className="earn-row">
              <div className="earn-ico">{inc.icon}</div>
              <div>
                <div className="earn-cat">{inc.category}</div>
                <div className="earn-headline" style={{color:q?inc.color:"#d8ead0"}}>{inc.headline}</div>
                <div className="earn-body">{inc.body}</div>
                <div className="earn-thresh">Programmes in this category typically require ≤{inc.threshold} kWh/day</div>
                {near&&(
                  <div className="earn-prog-wrap">
                    <div className="earn-prog-track">
                      <div className="earn-prog-fill" style={{width:prog+"%",background:inc.color}}/>
                    </div>
                    <div className="earn-prog-lbl">You are {fmt(total-inc.threshold)} kWh/day above this threshold</div>
                  </div>
                )}
              </div>
              <div>
                <div className="earn-tag" style={{
                  background:q?inc.color+"14":near?"#fbbf2412":"transparent",
                  color:q?inc.color:near?"#fbbf24":"#2d4f2a",
                }}>
                  {q?"In range":near?"Close":"Above"}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CompareTab({total}){
  const all=[...BENCHMARKS,{label:"You",kwh:parseFloat(fmt(total)),color:"#4ade80",isYou:true}]
    .sort((a,b)=>b.kwh-a.kwh);
  const maxKwh=all[0].kwh;
  return(
    <div className="page">
      <span className="eyebrow">Global context</span>
      <div className="page-title">Where you sit<br/>in the <em>world.</em></div>
      <p className="page-sub">Your footprint compared to national per-capita averages. All figures are total final energy consumption from IEA World Energy Balances 2022.</p>
      <div className="benchmarks">
        {all.map(bm=>(
          <div key={bm.label} className={`bm-row${bm.isYou?" you-row":""}`}>
            <div className="bm-label">
              {bm.label}
              {bm.isYou&&<span className="bm-you-tag">YOU</span>}
            </div>
            <div className="bm-track">
              <div className="bm-fill" style={{
                width:(bm.kwh/maxKwh*100)+"%",
                background:bm.isYou?"#4ade80":bm.color,
                opacity:bm.isYou?1:.55,
                animation:"barin .8s cubic-bezier(.4,0,.2,1) forwards",
              }}/>
            </div>
            <div className="bm-val" style={{color:bm.isYou?"#4ade80":"#6b9e65"}}>
              {fmt(bm.kwh)} <span style={{fontSize:9,color:"#2d4f2a"}}>kWh/day</span>
            </div>
          </div>
        ))}
      </div>
      <div className="method-box">
        <div className="method-title">Calculation methodology</div>
        <div>
          {[
            {cat:"🚿 Shower",   detail:"minutes × 0.14 kWh/min · Based on 8.5 kW average electric shower · Source: Energy Saving Trust"},
            {cat:"❄️ AC/Heating",detail:"hours × 1.5 kWh/hr · Average across AC units and resistance heating · Source: Energy Saving Trust"},
            {cat:"💻 Screens",  detail:"hours × 0.05 kWh/hr · ~50W average across desktop, laptop, phone, TV · Source: Energy Saving Trust"},
            {cat:"💡 Lights",   detail:"hours × 0.10 kWh/hr · 10 LED bulbs at 10W each · Source: Energy Saving Trust"},
            {cat:"🧺 Laundry",  detail:"loads ÷ 7 × 1 kWh/load · EU average wash cycle · Source: EU Energy Label"},
            {cat:"🚗 Driving",  detail:"km × 0.67 kWh/km · 7.5 L/100 km petrol × 8.9 kWh/litre · Source: EEA / IEA"},
            {cat:"🥩 Meat",     detail:"meals ÷ 7 × 5 kWh/meal · Embedded energy, blended meat average · Source: Poore & Nemecek, Science 2018"},
            {cat:"🧊 Fridges",  detail:"count × 1.2 kWh/day · EU Energy Label average fridge-freezer · Source: EU Energy Label"},
          ].map(m=>(
            <div key={m.cat} className="method-item">
              <span className="method-cat">{m.cat}</span>
              <span className="method-detail">{m.detail}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[vals,setVals]=useState(DEFAULTS);
  const[tab,setTab]=useState("track");
  const total=Object.entries(CFG).reduce((s,[id,c])=>s+c.kwh(vals[id]),0);
  const onChange=useCallback((id,v)=>setVals(p=>({...p,[id]:v})),[]);
  return(
    <>
      <style>{S}</style>
      <div className="gp">
        <div className="hdr">
          <div className="hdr-brand">
            <h1>GreenPrint</h1>
            <div className="by">by Avir Raisinghani</div>
          </div>
          <div className="hdr-nav">
            {TABS.map(t=>(
              <button key={t.id} className={`nav-btn${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>
            ))}
          </div>
          <div className="hdr-total">
            <div className="hdr-dot"/>
            <span className="hdr-num">{fmt(total)}</span>
            <span className="hdr-unit">kWh/day</span>
          </div>
        </div>
        <div className="body">
          {tab==="track"  &&<TrackTab   vals={vals} onChange={onChange} onAnalyse={()=>setTab("results")}/>}
          {tab==="results"&&<ResultsTab vals={vals} total={total} onBack={()=>setTab("track")}/>}
          {tab==="earn"   &&<EarnTab    total={total}/>}
          {tab==="compare"&&<CompareTab total={total}/>}
        </div>
        <div className="bottom-nav">
          {TABS.map(t=>(
            <button key={t.id} className={`bnav-btn${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>
              <div className="bnav-ind"/>
              <div className="bnav-ico">{t.icon}</div>
              <div className="bnav-lbl">{t.label}</div>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
